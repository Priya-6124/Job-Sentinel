<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jobSentinel</title>

<!-- Icons -->
<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: radial-gradient(circle at 20% 30%, #1e3a8a33, transparent),
                radial-gradient(circle at 80% 70%, #0ea5e933, transparent),
                linear-gradient(135deg, #0f172a, #020617);
    color: #fff;
    min-height: 100vh;
}

/* GLOW BACKGROUND */
.glow {
    position: fixed;
    width: 500px;
    height: 500px;
    background: #38bdf8;
    filter: blur(200px);
    opacity: 0.15;
    top: 20%;
    left: 30%;
    z-index: -1;
}

/* TOP BAR */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    backdrop-filter: blur(12px);
    background: rgba(15, 23, 42, 0.6);
    border-bottom: 1px solid rgba(56, 189, 248, 0.15);
}

.logo-header {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo-header img {
    width: 42px;
    border-radius: 50%;
    box-shadow: 0 0 12px #38bdf8;
}

.app-name {
    font-size: 26px;
    font-weight: 800;
    background: linear-gradient(135deg, #9ce7ff, #3cc7ff 55%, #f7d488);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* BUTTONS */
.auth-buttons button {
    padding: 10px 18px;
    border-radius: 8px;
    border: 1px solid #38bdf8;
    background: transparent;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.auth-buttons button:hover {
    background: #38bdf8;
    color: #020617;
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(56,189,248,0.4);
}

/* LAYOUT */
.container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 100px;
    padding: 60px;
    max-width: 1400px;
    margin: auto;
}

/* LEFT */
.logo-container {
    display: flex;
    align-items: center;
    gap: 20px;
}

.logo-container img {
    width: 120px;
    border-radius: 50%;
    animation: float 4s ease-in-out infinite;
}

@keyframes float {
    50% { transform: translateY(-12px); }
}

.app-title {
    font-size: 52px;
    font-weight: 900;
    background: linear-gradient(135deg, #9ce7ff, #3cc7ff 55%, #f7d488);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    
}

.tagline {
    font-size: 22px;
    margin: 20px 0;
    color: #cbd5e1;
}

.feature-item {
    margin: 12px 0;
    color: #94a3b8;
    font-size: 16px;
}

.feature-item i {
    color: #38bdf8;
    margin-right: 8px;
}

/* RIGHT */
.search-section h1 {
    font-size: 34px;
}

.subtitle {
    color: #94a3b8;
    margin: 10px 0 30px;
}

/* SEARCH BOX */
.search-box {
    display: flex;
    flex-direction: column;
    border-radius: 16px;
    overflow: hidden;
    background: rgba(30, 41, 59, 0.6);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(56, 189, 248, 0.2);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    transition: 0.3s;
}

.search-box:focus-within {
    border-color: #38bdf8;
    box-shadow: 0 0 30px rgba(56,189,248,0.3);
}

.search-box textarea {
    padding: 18px;
    background: transparent;
    border: none;
    color: white;
    font-size: 15px;
    min-height: 120px;
    resize: none;
    outline: none;
}

.search-box textarea::placeholder {
    color: #64748b;
}

.search-box button {
    padding: 16px;
    border: none;
    font-weight: 600;
    background: linear-gradient(135deg, #38bdf8, #0ea5e9);
    color: #020617;
    cursor: pointer;
    transition: 0.3s;
}

.search-box button:hover {
    transform: scale(1.05);
}

/* NOTE */
.note {
    margin-top: 10px;
    font-size: 14px;
    color: #64748b;
}

/* STATS */
.stats {
    display: flex;
    gap: 40px;
    margin-top: 50px;
}

.stat-item {
    text-align: center;
    transition: 0.3s;
}

.stat-item:hover {
    transform: translateY(-6px);
}

.stat-number {
    font-size: 30px;
    font-weight: bold;
    color: #38bdf8;
}

.stat-label {
    font-size: 13px;
    color: #94a3b8;
}

/* RESPONSIVE */
@media(max-width: 900px) {
    .container {
        flex-direction: column;
        text-align: center;
    }
}

</style>
</head>

<body>

<div class="glow"></div>

<!-- TOP BAR -->
<div class="top-bar">
    <div class="logo-header">
        <img src="../assets/images/logo.png">
        <span class="app-name">jobSentinel</span>
    </div>

    <div class="auth-buttons">
        <a href="login.html"><button>Login</button></a>
        <a href="signup.html"><button>Sign Up</button></a>
    </div>
</div>

<!-- MAIN -->
<div class="container">

    <!-- LEFT -->
    <div>
        <div class="logo-container">
            <img src="../assets/images/logo.png">
            <h1 class="app-title">jobSentinel</h1>
        </div>

        <p class="tagline">Your career's first line of defense</p>

        <div class="feature-item"><i class="ri-shield-check-line"></i>Protect from job scams</div>
        <div class="feature-item"><i class="ri-search-eye-line"></i>Verify company authenticity</div>
        <div class="feature-item"><i class="ri-lock-2-line"></i>Secure your job search</div>
    </div>

    <!-- RIGHT -->
    <div class="search-section">
        <h1>Scan Your Job Description</h1>
        <p class="subtitle">Paste a job description to detect potential scams</p>

        <div class="search-box">
            <textarea placeholder="Paste job description here..."></textarea>
            <button onclick="goToLogin()">Check Scam</button>
        </div>

        <p class="note">🔒 Login required before scanning</p>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-number">10K+</div>
                <div class="stat-label">Scanned</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">500+</div>
                <div class="stat-label">Scams Found</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">98%</div>
                <div class="stat-label">Accuracy</div>
            </div>
        </div>
    </div>

</div>

<script>
function goToLogin() {
    const btn = document.querySelector(".search-box button");
    btn.innerText = "Checking...";
    btn.style.opacity = "0.7";

    setTimeout(() => {
        window.location.href = "login.html";
    }, 800);
}
</script>

</body>
</html>
