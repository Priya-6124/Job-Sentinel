<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - jobSentinel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.55);
            --border-cyan: rgba(56, 189, 248, 0.25);
            --accent: #38bdf8;
            --accent-dim: #0ea5e9;
            --text-muted: #94a3b8;
            --text-dim: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(155deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
        }

        .logo-header {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .logo-header img {
            width: 40px;
            height: 40px;
            object-fit: cover;
            object-position: center;
            border-radius: 50%;
            transform: scale(1.08);
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.28);
        }

        .logo-header .app-name {
            font-size: 24px;
            font-weight: 700;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #9ce7ff, #3cc7ff 55%, #f7d488);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 14px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .nav-link:hover {
            color: var(--accent);
            background: rgba(56, 189, 248, 0.1);
        }

        .nav-link.primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-dim));
            color: var(--bg-dark);
            border: none;
        }

        .nav-link.primary:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(56, 189, 248, 0.4);
        }

        .nav-link.danger {
            background: linear-gradient(135deg, #7f1d1d, #991b1b);
            color: #fecaca;
            border: none;
        }

        .nav-link.danger:hover {
            filter: brightness(1.15);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(220, 38, 38, 0.45);
        }

        .nav-link.danger:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(220, 38, 38, 0.4);
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 48px 32px 64px;
        }

        .profile-cover {
            height: 140px;
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.15) 0%, rgba(14, 165, 233, 0.08) 50%, transparent 100%);
            border-radius: 16px 16px 0 0;
            border: 1px solid var(--border-cyan);
            border-bottom: none;
            position: relative;
        }

        .profile-card {
            background: var(--bg-card);
            border-radius: 0 0 16px 16px;
            padding: 0 40px 40px;
            border: 1px solid var(--border-cyan);
            border-top: none;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
            margin-bottom: 24px;
        }

        .profile-header {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 24px;
            margin-top: -64px;
            margin-bottom: 36px;
            position: relative;
            padding-bottom: 28px;
            border-bottom: 1px solid var(--border-cyan);
        }

        .avatar-wrap {
            flex-shrink: 0;
        }

        .profile-avatar {
            width: 128px;
            height: 128px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--accent), var(--accent-dim));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            color: var(--bg-dark);
            font-weight: 700;
            border: 4px solid var(--bg-dark);
            box-shadow: 0 12px 32px rgba(56, 189, 248, 0.35);
        }

        .profile-info {
            flex: 1;
            min-width: 200px;
        }

        .profile-name {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #e2e8f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
            letter-spacing: -0.02em;
        }

        .profile-role {
            font-size: 15px;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 12px;
        }

        .profile-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 13px;
            color: var(--text-dim);
        }

        .profile-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .profile-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px 24px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .detail-item.full-width {
            grid-column: 1 / -1;
        }

        .detail-label {
            font-size: 11px;
            color: var(--text-dim);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .detail-value {
            font-size: 15px;
            color: #e2e8f0;
            font-weight: 500;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border-cyan);
            border-radius: 10px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .detail-value:hover {
            border-color: rgba(56, 189, 248, 0.4);
            box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.15);
        }

        @media (max-width: 768px) {
            .top-bar {
                padding: 12px 20px;
            }

            .nav-actions {
                flex-wrap: wrap;
                justify-content: flex-end;
            }

            .container {
                padding: 32px 20px 48px;
            }

            .profile-card {
                padding: 0 24px 32px;
            }

            .profile-header {
                flex-direction: column;
                align-items: flex-start;
                margin-top: -56px;
                margin-bottom: 28px;
            }

            .profile-avatar {
                width: 112px;
                height: 112px;
                font-size: 36px;
            }

            .profile-name {
                font-size: 24px;
            }

            .profile-details {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 540px) {
            .profile-cover {
                height: 100px;
            }

            .profile-header {
                margin-top: -48px;
            }

            .profile-avatar {
                width: 96px;
                height: 96px;
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo-header" id="logoLink">
            <img src="../assets/images/logo.png" alt="jobSentinel Logo" onerror="this.style.display='none'">
            <span class="app-name">jobSentinel</span>
        </div>
        <nav class="nav-actions">
            <a href="job_seeker_homepage.html" class="nav-link" id="dashboardLink">Dashboard</a>
            <a href="profile.html" class="nav-link primary">Profile</a>
            <a href="homepage.html" class="nav-link danger" id="logoutLink">Logout</a>
        </nav>
    </div>

    <div class="container">
        <div class="profile-cover"></div>
        <div class="profile-card">
            <div class="profile-header">
                <div class="avatar-wrap">
                    <div class="profile-avatar" id="userAvatar">JD</div>
                </div>
                <div class="profile-info">
                    <h1 class="profile-name" id="userName">John Doe</h1>
                    <p class="profile-role" id="userRole">Job Seeker</p>
                    <div class="profile-meta">
                        <span id="memberSinceDisplay">Member since Jan 2024</span>
                        <span>&middot;</span>
                        <span id="userIdDisplay">USR-2024-001234</span>
                    </div>
                </div>
            </div>

            <div class="profile-details">
                <div class="detail-item">
                    <span class="detail-label">Email</span>
                    <div class="detail-value" id="userEmail">john.doe@example.com</div>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Account type</span>
                    <div class="detail-value" id="accountType">Job Seeker</div>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Member since</span>
                    <div class="detail-value" id="memberSince">January 15, 2024</div>
                </div>
                <div class="detail-item full-width">
                    <span class="detail-label">User ID</span>
                    <div class="detail-value" id="userId">USR-2024-001234</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function getDashboardPage(role) {
            if (role === "Recruiter") return "recruiter_homepage.html";
            if (role === "Job Seeker") return "job_seeker_homepage.html";
            return "homepage.html";
        }

        function applyRoleNavigation(role) {
            const dashboardPage = getDashboardPage(role);
            document.getElementById("dashboardLink").href = dashboardPage;
            document.getElementById("logoLink").onclick = () => {
                window.location.href = dashboardPage;
            };
        }

        async function loadUserProfile() {
            const stored = JSON.parse(localStorage.getItem("userData") || "null");
            applyRoleNavigation(stored?.role);

            if (!stored?.email) return;

            try {
                const res = await fetch(`http://localhost:5000/profile?email=${stored.email}`);
                const data = await res.json();

                document.getElementById("userName").textContent = data.full_name;
                document.getElementById("userEmail").textContent = data.email;
                document.getElementById("userRole").textContent = data.role;
                document.getElementById("accountType").textContent = data.role;
                document.getElementById("userId").textContent = data.public_user_id;
                document.getElementById("userIdDisplay").textContent = data.public_user_id;

                applyRoleNavigation(data.role);

                const created = new Date(data.created_at);
                const fullDate = created.toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" });
                const shortDate = created.toLocaleDateString("en-US", { month: "short", year: "numeric" });

                document.getElementById("memberSince").textContent = fullDate;
                document.getElementById("memberSinceDisplay").textContent = `Member since ${shortDate}`;

                document.getElementById("userAvatar").textContent =
                    data.full_name.split(" ").map(name => name[0]).join("").slice(0, 2).toUpperCase();
            } catch (error) {
                console.error("Failed to load profile", error);
            }
        }

        document.getElementById("logoutLink").addEventListener("click", () => {
            localStorage.removeItem("userData");
        });

        loadUserProfile();
    </script>
</body>
</html>
