<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agile Project | Forgot Password</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <h2>Forgot Password</h2>
        <p class="subtitle">
            Enter your registered email to reset your password
        </p>

        <!-- ðŸ”¥ FORM WITHOUT ACTION -->
        <form id="forgotForm">
            <div class="input-group">
                <label>Email Address</label>
                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    required
                >
            </div>

            <button type="submit" class="btn-primary">
                Continue to Reset
            </button>

            <p class="switch">
                Remembered your password?
                <a href="login.html">Back to Login</a>
            </p>
        </form>

        <!-- Message -->
        <p id="message" style="margin-top:14px; font-size:14px;"></p>
    </div>
</div>

<script>
document.getElementById("forgotForm").addEventListener("submit", async (e) => {
    e.preventDefault(); // ðŸš¨ STOP browser navigation

    const email = document.getElementById("email").value.trim();
    const message = document.getElementById("message");

    message.textContent = "Checking email...";
    message.style.color = "#94a3b8";

    try {
        const res = await fetch("http://localhost:5000/forgot-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (!res.ok) {
            message.textContent = data.error || "Failed to verify email";
            message.style.color = "#ef4444";
            return;
        }

        // Save email for reset step
        localStorage.setItem("resetEmail", email);

        message.textContent = "Email verified. Redirecting to reset password...";
        message.style.color = "#22c55e";

        setTimeout(() => {
            window.location.href = "reset-password.html";
        }, 1200);

    } catch (err) {
        message.textContent = "Server not reachable. Is Flask running?";
        message.style.color = "#ef4444";
    }
});
</script>

</body>
</html>
