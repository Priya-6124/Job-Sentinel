<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reset Password • jobSentinel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg-main: linear-gradient(135deg, #020617, #0f172a);
      --card-bg: rgba(30, 41, 59, 0.65);
      --accent: #38bdf8;
      --accent-2: #0ea5e9;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
      --border: rgba(56, 189, 248, 0.25);
      --text-muted: #94a3b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      background: var(--bg-main);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e5e7eb;
    }

    /* ================= CARD ================= */
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      padding: 42px;
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.45);
      text-align: center;
    }

    h2 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 10px;
      background: linear-gradient(135deg, var(--accent), #22d3ee);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 15px;
      color: var(--text-muted);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    /* ================= INPUTS ================= */
    .input-group {
      text-align: left;
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .input-group input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(2, 6, 23, 0.7);
      color: #e5e7eb;
      font-size: 15px;
      outline: none;
    }

    .input-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(56, 189, 248, 0.5);
    }

    /* ================= STRENGTH METER ================= */
    .strength-meter {
      height: 6px;
      background: rgba(148, 163, 184, 0.2);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 8px;
    }

    .strength-bar {
      height: 100%;
      width: 0%;
      transition: width 0.3s ease;
    }

    .strength-text {
      font-size: 12px;
      margin-top: 6px;
    }

    /* ================= BUTTON ================= */
    .btn-primary {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #020617;
      transition: all 0.25s ease;
      margin-top: 10px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(56, 189, 248, 0.5);
    }

    /* ================= FEEDBACK ================= */
    .error {
      color: var(--danger);
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }

    .success {
      display: none;
      color: var(--success);
      font-weight: 600;
      margin-top: 18px;
      animation: fadeIn 0.4s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <div class="auth-card">
    <h2>Reset Password</h2>
    <p class="subtitle">
      Create a strong new password for your account.
    </p>

    <form onsubmit="resetPassword(event)">
      <div class="input-group">
        <label>New Password</label>
        <input type="password" id="password" required oninput="checkStrength()" />
        <div class="strength-meter">
          <div class="strength-bar" id="strengthBar"></div>
        </div>
        <div class="strength-text" id="strengthText"></div>
      </div>

      <div class="input-group">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" required />
      </div>

      <button class="btn-primary">Reset Password</button>
    </form>

    <div class="error" id="errorMsg"></div>
    <div class="success" id="successMsg">
      ✅ Password reset successfully! Redirecting to login…
    </div>
  </div>

<script>
async function resetPassword(e) {
  e.preventDefault();

  const pass = document.getElementById("password").value;
  const confirm = document.getElementById("confirmPassword").value;
  const error = document.getElementById("errorMsg");
  const success = document.getElementById("successMsg");

  error.style.display = "none";

  if (pass !== confirm) {
    error.textContent = "Passwords do not match.";
    error.style.display = "block";
    return;
  }

  if (pass.length < 8) {
    error.textContent = "Password must be at least 8 characters long.";
    error.style.display = "block";
    return;
  }

  const email = localStorage.getItem("resetEmail");
  if (!email) {
    error.textContent = "Session expired. Please restart reset process.";
    error.style.display = "block";
    return;
  }

  try {
    const res = await fetch("http://localhost:5000/reset-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password: pass })
    });

    const data = await res.json();

    if (!res.ok) {
      error.textContent = data.error || "Reset failed";
      error.style.display = "block";
      return;
    }

    success.style.display = "block";

    // Cleanup
    localStorage.removeItem("resetEmail");

    setTimeout(() => {
      window.location.href = "login.html";
    }, 1500);

  } catch (err) {
    error.textContent = "Server error. Try again.";
    error.style.display = "block";
  }
}
</script>


</body>
</html>
